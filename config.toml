[plugin]
enabled = false
config_version = "2.1.0"

[admin]
admins = []
allow_group_owner = true
owner_allowed_commands = []
deny_response = "silent"

[identity]
bot_nickname = "麦麦"
auto_detect = true
bot_qq = ""

[identity.override_roles]

[auto_moderate]
enabled = true
enabled_groups = []
audit_model = "planner"
audit_max_tokens = 220
audit_confidence_gate = true
audit_confidence_threshold = 0.72

[media_audit]
audit_regular_images = true
audit_emojis = true
media_audit_max_items = 4
forwarded_media_audit_max_items = 8
media_description_timeout = 12.0
violation_media_policy = "none"
violation_media_notify_target = "admin_or_owner"
retry_violation_media_with_image_audit = true
violation_media_text_judge_enabled = true
notify_on_media_description_failure = false

[moderation_behavior]
persona_managed_comments_enabled = false
persona_managed_comments_model = "replyer"
expand_forwarded_records = true
auto_recall = false
trigger_moderation_reply = true

[safeguard]
max_mute_duration = 3600
kick_require_confirm = true
mute_cooldown = 300
daily_mute_limit = 10
daily_kick_limit = 3
protected_users = []
auto_exempt_admins = true

[safeguard.exempt_users]

[warning]
enabled = true
warning_reply_prefix = "⚠️"
spam_warn_threshold = 3
spam_warn_window = 600
treat_forwarded_records_as_single_message = true
abuse_warn_threshold = 1
abuse_warn_window = 3600
ad_warn_threshold = 1
ad_warn_window = 1800

[escalation]
enabled = true
escalation_steps = []

[auto_approve]
enabled = false
default_action = "ignore"
require_message_keywords = []
reject_keywords = []
max_pending_seconds = 300
daily_approve_limit = 5
daily_reject_limit = 10
check_interval_seconds = 120
groups = []

[logging]
max_log_entries = 2000
default_log_lines = 10
verbose_logging = false

[prompts]
auto_moderate_system = "【群管理参考 — 保持人设，自然融入】\n\n身份：{bot_role}  可用操作：{available_actions}\n\n发现违规时自然处理，不要解释操作：\n  广告/诈骗 → 撤回 + 禁言10-30分钟\n  连续刷屏 → 提醒一句，仍继续再禁言5-10分钟\n  辱骂/人身攻击 → 撤回 + 禁言1-6小时，再犯踢出\n  色情/违法 → 撤回 + 踢出\n  高质量分享 → 设精华表达赞赏\n  不确定 → 先观察，别着急动手\n\n操作前先用 group_get_member 确认目标身份；撤回/精华需先回复目标消息获取 message_id\n\n节奏：正常聊天，发现违规再处理。不要说\"已将xxx禁言\"这类话"
planner_moderate_system = "# 群管理准则\n\n你在此群身份：{bot_role}。可用操作：{available_actions}\n\n违规处理（自然执行，不要复述规则）：\n  广告/诈骗 → 撤回 + 禁言10-30分钟\n  连续刷屏 → 警告 → 仍继续则禁言5-10分钟\n  辱骂/人身攻击 → 撤回 + 禁言1-6小时，再犯踢出\n  色情/违法 → 撤回 + 踢出（管理员先征求群主同意）\n  高质量分享 → 设精华\n\n规则：\n- 操作前先调 group_get_member 确认身份\n- 禁言不超1小时，踢人前确认\n- 不确定则先观察\n\n以上融入决策，不要复述。"
violation_media_notice_prompt = "{bot_style_context}\n\n请用当前人设和表达风格，写一句很短的中文群聊发言，呼叫人工查看。\n场景：有{review_required_kind_detail}被主程序或模型判断为需要人工复核，自动审核无法确认{review_required_kind}内容是否违规。\n要求：自然、简短、像群里正常说话；不要说已经违规；不要要求撤回；不要包含@；不要解释技术细节；不要输出括号说明；不要表达出你看不到图片或表情包，也不要表达出你看到了图片或表情包内容。\n只输出一句话。"
command_denied_message = "你没有权限执行此操作。"
