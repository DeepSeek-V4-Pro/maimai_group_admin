[plugin]
enabled = true
config_version = "1.5.0"

[admin]
admins = [
    "412110245",
    "1114240495",
    "2241834219",
    "2484159496",
    "443669622",
]
allow_group_owner = true
owner_allowed_commands = []
deny_response = "reply"

[identity]
bot_nickname = "星期六"
auto_detect = true
bot_qq = "2235429527"

[identity.override_roles]

[auto_moderate]
enabled = true
enabled_groups = [
    "2154025251",
    "687349092",
    "1041061662",
]
audit_model = "utils"
audit_max_tokens = 512
audit_confidence_gate = true
audit_confidence_threshold = 0.72
audit_images = true
image_audit_max_images = 4
image_description_timeout = 12.0
image_unknown_policy = "notify_admin"
image_unknown_notice_use_llm = false
expand_forwarded_records = true
treat_forwarded_records_as_single_message = true
auto_recall = true
trigger_moderation_reply = true

[safeguard]
max_mute_duration = 3600
kick_require_confirm = true
mute_cooldown = 300
daily_mute_limit = 10
daily_kick_limit = 3
protected_users = []
auto_exempt_admins = true

[safeguard.exempt_users]

[warning]
enabled = true
spam_warn_threshold = 7
spam_warn_window = 600
abuse_warn_threshold = 1
abuse_warn_window = 3600
ad_warn_threshold = 1
ad_warn_window = 1800

[escalation]
enabled = true

[[escalation.escalation_steps]]
within_hours = 24
count = 1
action = "mute"
max_duration = 600

[[escalation.escalation_steps]]
within_hours = 24
count = 2
action = "mute"
max_duration = 1800

[[escalation.escalation_steps]]
within_hours = 24
count = 3
action = "mute"
max_duration = 3600

[auto_approve]
enabled = false
default_action = "ignore"
require_message_keywords = []
reject_keywords = []
max_pending_seconds = 300
daily_approve_limit = 5
daily_reject_limit = 10
check_interval_seconds = 120
groups = []

[logging]
max_log_entries = 2000
default_log_lines = 10
verbose_logging = true

[prompts]
auto_moderate_system = "【群管理参考 — 保持人设，融入语气，不要切换管理员口吻】\n\n身份：{admin}  可用工具：{\"status\",\"log\",\"mute\",\"kick\"}\n\n处理参考（以你的人设语气自然执行）：\n正常购物交易讨论 → 不干涉\n广告 → 撤回 + 禁言10-30分钟，明显恶意或诈骗号直接踢出\n连续刷屏 → 提醒一句，继续刷禁言5-10分钟\n公然调情 → 提醒移步私聊，继续发禁言5-10分钟\n轻微脏话 → 无视\n威胁/攻击性言论 → 先无视，继续则友好规劝\n严重脏话辱骂/人身攻击 → 撤回 + 禁言10分钟-1小时，再犯踢出\n擦边色情文字内容→从宽处理，轻度无视，过于露骨则提醒\n出格色情图片→撤回 + 视程度禁言10分钟-1小时\n违法内容 → 撤回 + 禁言1小时，再犯踢出\n轻度血腥 → 不管\n严重血腥/重口不适内容 → 提醒 + 撤回，继续发禁言5-30分钟\n恐怖诡异内容 → 表示害怕的感想，不做额外处理\n情绪、压抑话题 → 不要管\n政治话题 → 提醒不要展开，继续讨论或引战则撤回 + 禁言30分钟-3小时\n重复询问资源 → 温和提醒先看群精华、群相册或群文件\n不确定 → 先观察，别着急动手\n\n操作提示：警告/禁言填 group_id 和 user_id；踢人前先调 group_get_member；撤回/精华需 用户回复目标消息后获取 message_id\n\n节奏控制：正常聊天做自己，只在违规时动工具，不要说'已将xxx禁言'，用自然方式带过；轻微问题优先提醒和降温，严重风险内容优先撤回止损；一切发言先判定是不是现实的事情，虚拟内容相关的不构成问题的发言只要尺度不出格不算作违规。确定处理的对象是违规者而不是参与评判者，不要见到关键词就敏感处理。谨慎思考，一定要非常确定违规有害内容的时候才进行行动，包括提醒。"
command_denied_message = "星期六小姐不听你的喵。"
